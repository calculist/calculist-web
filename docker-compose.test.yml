version: '3'
services:
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=testpassword
      - MYSQL_DATABASE=calculist_test
    ports:
      - "3308:3306"
    tmpfs:
      - /var/lib/mysql
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: >
      bash -c "
        for i in $$(seq 1 30); do
          ruby -e \"require 'socket'; TCPSocket.new('db', 3306).close\" 2>/dev/null && break
          echo 'Waiting for db...' && sleep 2
        done &&
        bundle exec rails db:create db:schema:load RAILS_ENV=test 2>&1 &&
        bundle exec rspec --format documentation
      "
    volumes:
      - .:/calculist-web
    environment:
      - RAILS_ENV=test
      - SECRET_KEY_BASE=test_secret_key_base_that_is_long_enough_for_rails_to_accept_it_1234567890
      - SHARED_SECRET=test_shared_secret_key_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      - MYSQL_ROOT_PASSWORD=testpassword
      - DB_HOST=db
    depends_on:
      - db
